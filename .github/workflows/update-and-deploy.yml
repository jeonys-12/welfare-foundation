name: Update news and deploy Pages
on:
  schedule:
    - cron: "0 22 * * *" # 07:00 Asia/Seoul (UTC+9)
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "data/news.json"
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Collect and analyze public-interest news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.OPEN_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
        run: python scripts/collect_news.py
      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/news.json; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json
            git commit -m "Update monitoring data"
            git push
          fi
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: collect
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
